<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#a18cd1);
  overflow:hidden;
  color:white;
}

/* glow background */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:rgba(255,255,255,0.1);
  filter:blur(120px);
  top:-100px;
  left:-100px;
}

/* container */
.container{
  text-align:center;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,255,255,0.2);
  animation:fadeIn 2s ease;
}

/* heading */
h1{
  font-size:3rem;
  margin-bottom:10px;
  text-shadow:0 0 20px #fff;
}

#name{
  color:#ffe6f0;
  text-shadow:0 0 15px #ff4da6;
}

/* message */
p{
  font-size:1.1rem;
  line-height:1.6;
  max-width:450px;
}

/* buttons */
button{
  margin:10px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#ff4da6,#a18cd1);
  color:white;
  box-shadow:0 0 15px rgba(255,255,255,0.3);
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
}

/* cake */
.cake{
  margin:20px auto;
  width:140px;
  animation:float 3s ease-in-out infinite;
}
.layer{
  height:30px;
  border-radius:10px;
  margin:5px;
}
.layer1{background:#ff4da6;}
.layer2{background:#ffd166;}
.layer3{background:#7cf7ff;}

.candle{
  width:10px;
  height:30px;
  background:white;
  margin:auto;
  position:relative;
}
.flame{
  width:12px;
  height:18px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-1px;
  animation:flicker .2s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* hearts */
.heart{
  position:absolute;
  font-size:20px;
  animation:rise 6s linear infinite;
}

@keyframes rise{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-100vh);opacity:0;}
}

/* popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}
.popup-box{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">
  <h1>Happy Birthday <span id="name">UMRAH</span> 🎉</h1>

  <div class="cake">
    <div class="candle"><div class="flame"></div></div>
    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>
  </div>

  <p>
    Wishing you a day filled with happiness, laughter, and all the things you love. 
    May this year bring you success, good health, and lots of beautiful moments. 
    Enjoy your special day! 😊
  </p>

  <button onclick="playMusic()">🎵 Music</button>
  <button onclick="showPopup()">🎁 Surprise</button>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2>💖 Surprise 💖</h2>
    <p>You are amazing! Stay happy always ✨</p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
// name
const params=new URLSearchParams(window.location.search);
if(params.get("name")){
  document.getElementById("name").innerText=params.get("name");
}

// hearts
function heart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(15+Math.random()*25)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
setInterval(heart,400);

// music
function playMusic(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const notes=[392,392,440,392,523,494];
  let t=ctx.currentTime;

  notes.forEach(n=>{
    const o=ctx.createOscillator();
    o.frequency.value=n;
    o.connect(ctx.destination);
    o.start(t);
    o.stop(t+0.3);
    t+=0.35;
  });
}

// popup
function showPopup(){
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
